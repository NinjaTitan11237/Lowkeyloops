<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lowkey Loops</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="text-gray-800 dark:bg-gray-900 dark:text-white texture">

<!-- NAV -->
<header class="flex justify-between p-5 backdrop-blur-md bg-white/70 dark:bg-gray-800/70 sticky top-0 z-50">
<h1 class="tracking-wide font-semibold">Lowkey Loops</h1>

<div class="flex gap-4">
<button id="darkToggle">🌙</button>
<button id="wishlistToggle">❤️</button>
<button id="cartToggle">🛒 <span id="cartCount">0</span></button>
</div>
</header>

<!-- HERO -->
<section class="text-center py-16">
<h1 class="text-4xl mb-4">Handmade Comfort</h1>
<p class="text-gray-500">Soft, subtle, handmade essentials</p>
</section>

<!-- FILTERS -->
<section class="p-6 flex flex-wrap gap-3 justify-center">
<input id="searchInput" placeholder="Search..." class="p-2 rounded bg-neutral-100 dark:bg-neutral-800">

<select id="sortSelect" class="p-2 rounded bg-neutral-100 dark:bg-neutral-800">
<option value="none">Sort</option>
<option value="low">Price ↑</option>
<option value="high">Price ↓</option>
</select>

<button class="filterBtn" data-cat="all">All</button>
<button class="filterBtn" data-cat="plushies">Plushies</button>
<button class="filterBtn" data-cat="wearables">Wearables</button>
<button class="filterBtn" data-cat="accessories">Accessories</button>
</section>

<!-- PRODUCTS -->
<section class="p-10">
<div id="productGrid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<!-- OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/30 hidden z-40"></div>

<!-- CART -->
<div id="cartPanel" class="fixed right-0 top-0 w-full md:w-80 h-full backdrop-blur-xl bg-white/80 dark:bg-gray-800/80 p-5 transform translate-x-full transition z-50">
<h2 class="text-2xl mb-4">Cart</h2>
<div id="cartItems"></div>
</div>

<!-- WISHLIST -->
<div id="wishlistPanel" class="fixed left-0 top-0 w-full md:w-80 h-full backdrop-blur-xl bg-white/80 dark:bg-gray-800/80 p-5 transform -translate-x-full transition z-50">
<h2 class="text-2xl mb-4">Wishlist</h2>
<div id="wishlistItems"></div>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden z-50"></div>

<script type="module" src="app.js"></script>
</body>
</html>
